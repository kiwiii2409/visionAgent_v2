<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision Agent Tray</title>
    <link rel="stylesheet" href="/tray_static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>Local Agent</h1>
        <button id="settingsBtn" class="icon-btn">
          <i class="fas fa-cog"></i>
        </button>
      </header>

      <div id="settingsPanel" class="settings-panel hidden">
        <div class="setting-group">
          <label for="folderInput">Index New Folder</label>
          <div class="input-group">
            <input
              type="text"
              id="folderInput"
              placeholder="e.g., ./data/docs"
            />
            <button id="indexBtn">Index</button>
          </div>
          <p id="indexStatus" class="status-msg"></p>
        </div>
        <div id="settingsPanel" class="hidden">
          <div class="setting-item">
            <label
              for="websearchToggle"
              class="flex items-center cursor-pointer"
            >
              <input type="checkbox" id="websearchToggle" class="mr-2" />
              <span>Enable Web Search</span>
            </label>
          </div>
        </div>
      </div>

      <main class="chat-main">
        <div class="chat-history" id="chatHistory">
          <div class="message system">
            <div class="message-content">
              Ask a question or assign a task to begin.
            </div>
          </div>
        </div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <textarea
              id="promptInput"
              placeholder="Type your prompt here..."
              rows="1"
            ></textarea>
            <button id="actionBtn" class="send-btn">
              <i id="actionIcon" class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </main>
    </div>
    <script src="/tray_static/script.js"></script>
  </body>
</html>
